name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale Issues and PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale due to inactivity.
            It will be closed if no further activity occurs within 30 days.
            If it is still relevant, please leave a comment or update the issue.
          stale-pr-message: >
            This pull request has been automatically marked as stale due to inactivity.
            It will be closed if no further activity occurs within 30 days.
            Please update the PR or close it if it is no longer needed.
          close-issue-message: >
            Closing this issue due to prolonged inactivity. Feel free to reopen
            if it becomes relevant again.
          close-pr-message: >
            Closing this pull request due to prolonged inactivity. Feel free to
            reopen if you'd like to continue the work.
          days-before-stale: 90
          days-before-close: 30
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,accepted,bug,enhancement,do-not-close"
          exempt-pr-labels: "pinned,do-not-close"
          exempt-draft-pr: true
          operations-per-run: 30
