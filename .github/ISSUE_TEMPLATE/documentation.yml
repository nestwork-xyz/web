name: "📝 Documentation Issue"
description: Report missing, incorrect, or outdated documentation.
title: "docs: "
labels:
  - "documentation"
  - "needs-triage"
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template to report documentation that is missing, incorrect, or unclear.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been reported before
          required: true

  - type: dropdown
    id: type
    attributes:
      label: Issue type
      options:
        - "Missing documentation"
        - "Incorrect documentation"
        - "Outdated documentation"
        - "Unclear or confusing documentation"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Where is the documentation issue? Link to the file or page.
      placeholder: "e.g. CONTRIBUTING.md, Section 4 — Branching Strategy"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong or missing? What should it say instead?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
